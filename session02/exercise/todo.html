<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO App</title>
  </head>
  <body>
    <header>
      <h1>TOTO App</h1>
    </header>

    <!-- ===== メインコンテンツ ===== -->
    <main>
      <form id="todo-form">
        <input type="text" name="" id="todo-input" placeholder="新しいTODOを入力...">
        <button type="submit">追加</button>
      </form>
      <ul id="todo-list">
        <li>
          <label>
            <input type="checkbox">
            <span>ご飯を食べる</span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox">
            <span>明日の準備をする</span>
          </label>
        </li>
        <li>
          <label>
            <input type="checkbox" checked>
            <span>世界を救う</span>
          </label>
        </li>
      </ul>
    </main>
    <footer>
      <p>&copy; 2026 gorudora</p>
    </footer>
  </body>
</html>
